# ── Production overrides (Railway) ─────────────────────────────────────────────
# Activated automatically by Railway via SPRING_PROFILES_ACTIVE=prod env var

# ── PostgreSQL ──────────────────────────────────────────────────────────────────
# Railway injects DATABASE_URL as postgres://user:pass@host:port/db
# DatabaseConfig.java converts this to a proper JDBC HikariDataSource automatically
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 autoconfiguration — the custom DataSource bean in DatabaseConfig.java takes over
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# ── Hibernate ──────────────────────────────────────────────────────────────────
# create-drop on first deploy to build the schema, then switch to validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 console disabled in prod ────────────────────────────────────────────────
spring.h2.console.enabled=false

# ── JWT (set JWT_SECRET in Railway environment variables) ──────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ── Server port (Railway sets PORT automatically) ──────────────────────────────
server.port=${PORT:8080}
