# ── Production overrides (Railway) ─────────────────────────────────────────────
# Activated automatically by Railway via SPRING_PROFILES_ACTIVE=prod env var

# ── PostgreSQL (Railway provides individual vars — JDBC URL is constructed here) ──
# Railway injects: PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Hibernate ──────────────────────────────────────────────────────────────────
# create-drop on first deploy to build the schema, then switch to validate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 console disabled in prod ────────────────────────────────────────────────
spring.h2.console.enabled=false

# ── JWT (set JWT_SECRET in Railway environment variables) ──────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ── Server port (Railway sets PORT automatically) ──────────────────────────────
server.port=${PORT:8080}
