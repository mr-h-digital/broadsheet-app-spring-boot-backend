# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── Datasource (H2 in-memory for dev) ──────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:wpcbroadsheet;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ─────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── H2 Console (dev only — disable in production) ──────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ─────────────────────────────────────────────────────────────────────────
# IMPORTANT: Replace this secret with a long random value in production.
# Minimum 32 bytes (256 bits) required for HS256.
jwt.secret=wpc-broadsheet-super-secret-key-change-me-in-production-32bytes
jwt.expiration-ms=86400000

# ── Jackson ─────────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Logging ──────────────────────────────────────────────────────────────────────
logging.level.co.za.mrhdigital=INFO
logging.level.org.springframework.security=WARN
